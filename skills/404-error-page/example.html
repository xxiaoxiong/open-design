<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .container {
      max-width: 600px;
      text-align: center;
      background: white;
      padding: 64px 48px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .error-visual {
      margin-bottom: 32px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
    
    .error-number {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    
    .error-icon {
      font-size: 4rem;
      opacity: 0.2;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #0a0a0a;
    }
    
    .description {
      font-size: 1.125rem;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.7;
    }
    
    .search-box {
      position: relative;
      margin-bottom: 40px;
    }
    
    .search-input {
      width: 100%;
      padding: 16px 48px 16px 20px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: #fafafa;
      transition: all 0.2s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }
    
    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }
    
    .helpful-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    
    .link-button {
      display: block;
      padding: 14px 24px;
      background: #f5f5f5;
      color: #333;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .link-button:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    .link-button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
    }
    
    .link-button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .secondary-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
    }
    
    .secondary-link {
      color: #667eea;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    .secondary-link:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    @media (max-width: 640px) {
      .container {
        padding: 48px 32px;
      }
      
      .error-number {
        font-size: 6rem;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .description {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-visual" data-od-id="visual">
      <div class="error-number">404</div>
      <div class="error-icon">🔍</div>
    </div>
    
    <h1 data-od-id="headline">Page Not Found</h1>
    
    <p class="description" data-od-id="body">
      The page you're looking for doesn't exist or has been moved. 
      Try searching or return to the homepage to find what you need.
    </p>
    
    <div class="search-box" data-od-id="search">
      <input 
        type="text" 
        class="search-input" 
        placeholder="Search for pages, products, or help..."
        aria-label="Search"
      >
      <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM18 18l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    
    <div class="helpful-links" data-od-id="links">
      <a href="/" class="link-button primary">
        Go to Homepage
      </a>
      <a href="/products" class="link-button">
        Browse Products
      </a>
      <a href="/blog" class="link-button">
        Read Our Blog
      </a>
      <a href="/contact" class="link-button">
        Contact Support
      </a>
    </div>
    
    <div class="secondary-links">
      <a href="/about" class="secondary-link">About Us</a>
      <a href="/help" class="secondary-link">Help Center</a>
      <a href="/sitemap" class="secondary-link">Site Map</a>
    </div>
  </div>
</body>
</html>
